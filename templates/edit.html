<!DOCTYPE html>
<html>
<head>
    <title>Edit Game</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="container">
        <div class="card" style="width: 400px;">
            <h2>Edit Game</h2>
            
            <form method="POST">
                
                <div class="input-group">
                    <label for="game">Game Name</label>
                    <input
                        type="text"
                        id="game"
                        name="game"
                        value="{{ game[1] }}"
                        required
                    >
                </div>

                <div class="input-group">
                    <label for="value">Current Rank</label>
                    <select id="value" name="value" required>

                    {% for rank in ranks %}

                    <option
                        value="{{ rank }}"
                        {% if rank == game[2] %}selected{% endif %}
                    >
                        {{ rank }}
                    </option>

                    {% endfor %}

                    </select>

                <div class="input-group">
                    <label for="goal">Goal Rank</label>
                    <select id="goal" name="goal" required>

                    {% for rank in ranks %}

                    <option
                        value="{{ rank }}"
                        {% if rank == game[3] %}selected{% endif %}
                    >
                        {{ rank }}
                    </option>

                    {% endfor %}

                    </select>

                <button type="submit" class="edit-btn" style="width: 100%; margin-top: 10px;">
                    Save Changes
                </button>

            </form>
        </div>
    </div>

</body>
</html>
